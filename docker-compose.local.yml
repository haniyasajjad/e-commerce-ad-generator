version: '3.9'

services:
  # ======================================================
  # FASTAPI — AD CREATIVE GENERATOR (LLM SERVICE)
  # ======================================================
  ad-creative-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ad-creative-api
    ports:
      - "8000:8000"   # API
      - "8001:8001"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
    volumes:
      - ./models:/app/models
    depends_on:
      - mlflow

  # ======================================================
  # MLflow SERVER
  # ======================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlartifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow.db:/mlflow.db
      - ./mlartifacts:/mlartifacts
    environment:
      - MLFLOW_DISABLE_HOST_CHECK=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ======================================================
  # AIRFLOW — Lightweight, SQLite backend
  # ======================================================
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__FERNET_KEY=fheGn1L_-GHKlKzYoUCtnkoHyjZlK6wOWM0mFvmSLVo=
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - AIRFLOW__WEBSERVER__WORKERS=2
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT=300  # Default 120 → 300 seconds
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=300  # Extra safety
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./models:/opt/airflow/models
      - ./data:/opt/airflow    # ← This path must match the conn string
    

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__FERNET_KEY=fheGn1L_-GHKlKzYoUCtnkoHyjZlK6wOWM0mFvmSLVo=
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__WEBSERVER__WORKERS=2
      - AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT=300  # Default 120 → 300 seconds
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=300  # Extra safety
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow    # ← SAME MOUNT
    depends_on:
      - airflow-webserver
    restart: always

  # ======================================================
  # PROMETHEUS
  # ======================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - ad-creative-api

  # ======================================================
  # GRAFANA
  # ======================================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  airflow_logs:
  airflow_dags:
