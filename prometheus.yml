global:
  scrape_interval: 10s
  evaluation_interval: 10s

# Alertmanager configuration (optional but good for alerts)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules for alerting
rule_files:
  - "/etc/prometheus/prometheus-alerts.yml"

scrape_configs:
  # Scrape the FastAPI app running on host machine
  - job_name: 'ad-creative-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8000']  # Use host.docker.internal on Mac
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: '(ad_.*|python_.*)'
        action: keep

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']