# Stable deployment (90% traffic)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-creative-stable
  labels:
    app: ad-creative-api
    version: stable
spec:
  replicas: 9  # 90% of traffic
  selector:
    matchLabels:
      app: ad-creative-api
      version: stable
  template:
    metadata:
      labels:
        app: ad-creative-api
        version: stable
    spec:
      containers:
      - name: ad-creative
        image: 22i1081/ad-creative-api:stable
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_VERSION
          value: "stable"
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow:5000"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5

---
# Canary deployment (10% traffic)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-creative-canary
  labels:
    app: ad-creative-api
    version: canary
spec:
  replicas: 1  # 10% of traffic
  selector:
    matchLabels:
      app: ad-creative-api
      version: canary
  template:
    metadata:
      labels:
        app: ad-creative-api
        version: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: ad-creative
        image: 22i1081/ad-creative-api:canary  # New version
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_VERSION
          value: "canary"
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow:5000"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5

---
# Shared service (load balances across both versions)
apiVersion: v1
kind: Service
metadata:
  name: ad-creative-service
  labels:
    app: ad-creative-api
spec:
  type: LoadBalancer
  selector:
    app: ad-creative-api  # Matches BOTH stable and canary
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
    name: http
  - protocol: TCP
    port: 8001
    targetPort: 8001
    name: metrics

---
# HorizontalPodAutoscaler for stable
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ad-creative-stable-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ad-creative-stable
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# ServiceMonitor for Prometheus (if using Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ad-creative-monitor
  labels:
    app: ad-creative-api
spec:
  selector:
    matchLabels:
      app: ad-creative-api
  endpoints:
  - port: metrics
    interval: 15s
    path: /metrics